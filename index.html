<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>MicroVend — операционная система для вендинговых аппаратов</title>
  <meta name="description" content="MicroVend — операционная система для вендинговых аппаратов." />
  <meta name="theme-color" content="#277bc0" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />

  <!-- Fonts: Montserrat (display) + Inter (body). -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS v4 — browser build, no toolchain. Compiles in the page.
       For a production build, lift the block below into a .css file and run
       `npx @tailwindcss/cli -i in.css -o out.css --minify`. See DESIGN_SYSTEM.md. -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- ===================================================================
       MicroVend Design System — canonical tokens (Tailwind v4 @theme).
       Colors from the brand logo (assets/logo.svg):
         blue #277BC0 · amber #FF9B00 / #FEB139 · neutral gray #707070.
       Montserrat = display/h1/h2 + highlights; Inter = everything else.
       Light theme only. Icons: Fluent System Icons (inline SVG).
       =================================================================== -->
  <style type="text/tailwindcss">
    @theme {
      /* --- Primary (blue, brand = 600 #277BC0) --- */
      --color-primary-50:  #eff6fc;
      --color-primary-100: #d6e9f7;
      --color-primary-200: #aed3ef;
      --color-primary-300: #79b6e2;
      --color-primary-400: #4496d2;
      --color-primary-500: #2a82c8;
      --color-primary-600: #277bc0;
      --color-primary-700: #21649c;
      --color-primary-800: #1f527e;
      --color-primary-900: #1d4567;
      --color-primary-950: #122b41;

      /* --- Accent (amber, brand = 500 #FF9B00 / light 400 #FEB139) --- */
      --color-accent-50:  #fff8eb;
      --color-accent-100: #feefc8;
      --color-accent-200: #fedc8b;
      --color-accent-300: #fec95a;
      --color-accent-400: #feb139;
      --color-accent-500: #ff9b00;
      --color-accent-600: #e07c00;
      --color-accent-700: #b95b03;
      --color-accent-800: #96470b;
      --color-accent-900: #7b3b0e;
      --color-accent-950: #471d02;

      /* --- Neutral (pure gray, wordmark ≈ 500 #707070) --- */
      --color-neutral-50:  #fafafa;
      --color-neutral-100: #f5f5f5;
      --color-neutral-200: #e5e5e5;
      --color-neutral-300: #d4d4d4;
      --color-neutral-400: #a3a3a3;
      --color-neutral-500: #737373;
      --color-neutral-600: #525252;
      --color-neutral-700: #404040;
      --color-neutral-800: #262626;
      --color-neutral-900: #171717;
      --color-neutral-950: #0a0a0a;

      /* --- Semantic --- */
      --color-success: #16a34a;
      --color-success-soft: #dcfce7;
      --color-warning: #d97706;
      --color-warning-soft: #fef3c7;
      --color-danger: #dc2626;
      --color-danger-soft: #fee2e2;
      --color-info: #277bc0;
      --color-info-soft: #d6e9f7;

      /* --- Surface aliases (light theme) --- */
      --color-background: #ffffff;
      --color-surface: #fafafa;
      --color-surface-alt: #f4f8fb;
      --color-border: #e5e5e5;
      --color-text: #171717;
      --color-text-muted: #525252;
      --color-text-subtle: #737373;

      /* --- Typography --- */
      --font-display: "Montserrat", ui-sans-serif, system-ui, sans-serif;
      --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;

      --text-display: clamp(2.5rem, 1.4rem + 4.4vw, 4.5rem);
      --text-display--line-height: 1.05;
      --text-display--letter-spacing: -0.02em;
      --text-display--font-weight: 800;

      --text-h1: clamp(2rem, 1.4rem + 2.6vw, 3rem);
      --text-h1--line-height: 1.1;
      --text-h1--letter-spacing: -0.02em;
      --text-h1--font-weight: 700;

      --text-h2: clamp(1.5rem, 1.2rem + 1.4vw, 2.25rem);
      --text-h2--line-height: 1.15;
      --text-h2--letter-spacing: -0.01em;
      --text-h2--font-weight: 700;

      --text-h3: 1.5rem;
      --text-h3--line-height: 1.25;
      --text-h3--font-weight: 600;

      --text-h4: 1.25rem;
      --text-h4--line-height: 1.3;
      --text-h4--font-weight: 600;

      --text-body-lg: 1.125rem;
      --text-body-lg--line-height: 1.7;
      --text-body: 1rem;
      --text-body--line-height: 1.65;
      --text-small: 0.875rem;
      --text-small--line-height: 1.5;
      --text-caption: 0.75rem;
      --text-caption--line-height: 1.4;
      --text-caption--letter-spacing: 0.02em;

      /* --- Radius & shadow --- */
      --radius-sm: 0.375rem;
      --radius-md: 0.625rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --shadow-soft: 0 1px 2px rgb(23 23 23 / 0.04), 0 4px 16px rgb(23 23 23 / 0.06);
      --shadow-pop: 0 8px 30px rgb(39 123 192 / 0.18);
    }

    @layer base {
      html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
      body {
        font-family: var(--font-sans);
        color: var(--color-text);
        background-color: var(--color-background);
      }
      /* Large headings → Montserrat; h3+ → Inter (brand rule). */
      h1, h2, .font-display { font-family: var(--font-display); }
      h3, h4, h5, h6 { font-family: var(--font-sans); font-weight: 600; }
    }

    @layer components {
      /* Highlighted word inside a headline. */
      .text-highlight { font-family: var(--font-display); font-weight: 700; color: var(--color-accent-500); }
      /* Blue → amber gradient highlight. */
      .text-gradient {
        font-family: var(--font-display); font-weight: 800;
        background-image: linear-gradient(90deg, var(--color-primary-600), var(--color-accent-500));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
    }
  </style>
</head>
<body>
  <!-- Skip link for keyboard users -->
  <a href="#main" class="sr-only">Перейти к содержимому</a>

  <header>
    <!-- TODO: nav + brand -->
  </header>

  <main id="main">
    <!-- TODO: hero + feature sections -->
  </main>

  <footer>

  </footer>
</body>
</html>
